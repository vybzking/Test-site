<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School System - Create Subject</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Create New Subject</h2>
        
        <div id="statusMessage" class="hidden p-4 mb-4 text-sm rounded-lg" role="alert"></div>

        <form id="subjectForm" class="space-y-4">
            <div>
                <label for="subjectName" class="block text-sm font-medium text-gray-700 mb-1">Subject Name</label>
                <input type="text" id="subjectName" required placeholder="e.g., Advanced Mathematics"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="subjectCode" class="block text-sm font-medium text-gray-700 mb-1">Subject Code</label>
                <input type="text" id="subjectCode" required placeholder="e.g., MATH-401"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="department" class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                <select id="department" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">Select Department</option>
                    <option value="science">Science</option>
                    <option value="mathematics">Mathematics</option>
                    <option value="humanities">Humanities</option>
                    <option value="languages">Languages</option>
                    <option value="arts">Arts & Music</option>
                </select>
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description (Optional)</label>
                <textarea id="description" rows="3" placeholder="Brief overview of the curriculum..."
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Add Subject
            </button>
        </form>
    </div>

    <script type="module">
        // Import the functions you need from the SDKs
        
    </script>
</body>
</html>

<html>
<head>
  <style>
    .form-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  align-items: center;
}

.form-row input {
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  flex: 1; /* Allows inputs to stretch equally */
}

.remove-btn {
  background-color: #ff4d4d;
  color: white;
  border: none;
  border-radius: 4px;
  width: 34px;
  height: 34px;
  cursor: pointer;
  font-size: 18px;
}

.remove-btn:hover {
  background-color: #cc0000;
}

#add-field-btn {
  background-color: #4caf50;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  margin-right: 10px;
}
  </style>
</head>
<body>
<form id="assignment-form">
  <h3>Theory Questions</h3>
  
  <div id="dynamic-fields-container">
    <div class="form-row">
      <input type="number" name="question-numbers[]" placeholder="Question number" min="1" max="100" required>
      <input type="text" name="questions[]" placeholder="Question" required>
      <button type="button" class="remove-btn">×</button>
    </div>
  </div>

  <div class="form-actions">
    <button type="button" id="add-field-btn">+ Add Another Question</button>
    <button type="submit">Save</button>
  </div>
</form>
 <script src="add-theory.js"></script>
 </body>
</html>

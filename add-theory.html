<html>
<head>
  <style>
    .form-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  align-items: center;
}

.form-row input {
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  flex: 1; /* Allows inputs to stretch equally */
}

.remove-btn {
  background-color: #ff4d4d;
  color: white;
  border: none;
  border-radius: 4px;
  width: 34px;
  height: 34px;
  cursor: pointer;
  font-size: 18px;
}

.remove-btn:hover {
  background-color: #cc0000;
}

#add-field-btn {
  background-color: #4caf50;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  margin-right: 10px;
}
  </style>
</head>
<body>
<form id="assignment-form">
  <h3>Theory Questions</h3>
  
  <div class="select-container">
  
    <label for="class-select">Select a Class:</label>
  
    <select id="class-select" name="class">
       <option value="" disabled selected>Select an option</option>
       <option value="class-1">Class 1</option>
       <option value="class-2">Class 2</option>
       <option value="class-3">Class 3</option>
       <option value="class-4">Class 4</option>
       <option value="class-5">Class 5</option>
       <option value="class-6">Class 6</option>
       <option value="jhs-1">JHS 1</option>
       <option value="jhs-2">JHS 2</option>
       <option value="jhs-3">JHS 3</option>
       <option value="shs-1">SHS 1</option>
       <option value="shs-2">SHS 2</option>
       <option value="shs-3">SHS 3</option>
  </select>
  </div>
  
  <div id="dynamic-fields-container">
    <div class="form-row">
      <span>1.</span><input type="text" name="questions[]" placeholder="Question" required>
      <button type="button" class="remove-btn">×</button>
    </div>
  </div>

  <div class="form-actions">
    <button type="button" id="add-field-btn">+ Add Another Question</button>
    <button type="submit">Save</button>
  </div>
</form>
 <script type="module" src="add-theory.js"></script>
 </body>
</html>

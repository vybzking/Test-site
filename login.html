<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Login</title>
  <style>
    /* Deep dark purple theme styling */
    body {
      margin: 0;
      padding: 40px 20px;
      background-color: #120524; /* Very deep dark purple */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #f3f0f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
    }

    .form-container {
      background-color: #220f3d; /* Rich purple card */
      width: 100%;
      max-width: 420px;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4), 0 0 1px 1px rgba(255, 255, 255, 0.1);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 10px;
      color: #ffffff;
      font-size: 24px;
    }

    p.subtitle {
      color: #cbd5e1;
      font-size: 14px;
      margin-top: 0;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 12px;
      background-color: #1a0933; /* Darker purple inputs */
      border: 1px solid #4c2f75;
      border-radius: 8px;
      font-size: 15px;
      color: #ffffff;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder {
      color: #6b538c;
    }

    input:focus {
      outline: none;
      border-color: #9061f9; /* Purple glow */
      box-shadow: 0 0 0 3px rgba(144, 97, 249, 0.25);
    }

    .submit-btn {
      width: 100%;
      background-color: #7e3af2;
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 10px;
      letter-spacing: 0.5px;
    }

    .submit-btn:hover {
      background-color: #6c2bd9;
    }

    .submit-btn:active {
      background-color: #5b21b6;
    }

    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #cbd5e1;
    }

    .register-link a {
      color: #9061f9;
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to manage student WASSCE performance records.</p>

    <form id="login-form">
      <!-- Email Address -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="e.g., teacher@school.edu" required>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="submit-btn">Log In</button>
    </form>

    <div class="register-link">
      Need an account? <a href="signup.html">Register here</a>
    </div>
  </div>

  <!-- Load Firebase SDK Modules -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Standard Firebase Project Config keys
    const firebaseConfig = {
    apiKey: "AIzaSyCP8QucUl9sS_z5x7syJYJps8mAmocdjbo",
    authDomain: "trial-project-33cbb.firebaseapp.com",
    projectId: "trial-project-33cbb",
    storageBucket: "trial-project-33cbb.firebasestorage.app",
    messagingSenderId: "453484633595",
    appId: "1:453484633595:web:2cc944c931387521fdff5e",
    measurementId: "G-N9QJPYSGQM"
  };
    // Initialize Services
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Form Submit Handler
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // Step 1: Sign the user in via Firebase Authentication
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        console.log("Authenticated successfully. Fetching user database role...");

        // Step 2: Fetch their user profile document from Firestore to read their role
        const userDocRef = doc(db, "users", user.uid);
        const userDocSnap = await getDoc(userDocRef);

        if (userDocSnap.exists()) {
          const userData = userDocSnap.data();
          
          // Step 3: Check permissions. Only teachers should access the score entry page.
          if (userData.role === "teacher") {
            alert(`Welcome back, Instructor ${userData.displayName || ''}!`);
            
            // Redirect straight to your score uploading page
            window.location.href = "score-uploads.html"; 
          } else {
            // It's a student trying to access the upload portal! Kick them out.
            alert("Access Denied: This portal is reserved for teachers and administrators only.");
            await auth.signOut(); // Immediately terminate their session
          }
        } else {
          alert("Login error: Your user profile document was not found in the database.");
          await auth.signOut();
        }

      } catch (error) {
        console.error("Login Error encountered:", error.code, error.message);
        
        // Handle typical authentication failures gracefully
        if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          alert("Login failed: Incorrect email address or password.");
        } else {
          alert(`Login failed: ${error.message}`);
        }
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #28a745; }
        .btn { background: #6c757d; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Teachers Portal</h2>
        <button class="btn" onclick="handleLogout()">Sign Out</button>
    </header>

    <div class="grid">
        
        <div class="card">
            <h3>Create MCQ Assignment</h3>
            <p>Create objectives home work for students.</p>
            <button onclick="window.location.href='add-mcq.html'" style="background:#28a745; color:white; border:none; padding:8px 12px; border-radius:4px;">Upload</button>
        </div>
        
        <div class="card">
            <h3>Create Theory</h3>
            <p>Create theory home work for students.</p>
            <button onclick="window.location.href='add-theory.html'" style="background:#28a745; color:white; border:none; padding:8px 12px; border-radius:4px;">Upload</button>
        </div>

        <div class="card">
            <h3>MCQ & Theory Assignment</h3>
            <p>Create assignment making up of both theory and objectives.</p>
            <button onclick="window.location.href='add-mcq-and-theory.html'" style="background:#28a745; color:white; border:none; padding:8px 12px; border-radius:4px;">Upload</button>
        </div>
        
        
    </div>

    <script type="module">
        
    </script>
</body>
</html>

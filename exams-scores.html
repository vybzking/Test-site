
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Portal - Exam Performance</title>
  <style>
    :root {
      --primary: #1e293b;
      --accent: #d97706; /* Gold accent */
      --background: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #334155;
      --border: #e2e8f0;
      --success: #15803d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--background); color: var(--text-main); padding: 2rem; }
    
    .container { max-width: 1100px; margin: 0 auto; }
    
    /* Header Styles */
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border); }
    h1 { color: var(--primary); font-size: 1.8rem; }
    .user-badge { background: var(--primary); color: white; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem; font-weight: 600; }
    
    /* Teacher Controls View */
    .filter-panel { background: var(--card-bg); padding: 1.25rem; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 1.5rem; display: none; align-items: center; gap: 1rem; }
    .filter-panel label { font-weight: 600; color: var(--primary); }
    select { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); min-width: 220px; outline: none; font-size: 0.95rem; }
    
    /* Performance Table */
    .table-container { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { background-color: var(--primary); color: white; padding: 1rem; font-weight: 600; font-size: 0.95rem; }
    td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background-color: #f1f5f9; }
    
    /* Dynamic UI Badges */
    .percentage-badge { background-color: #e2e8f0; color: var(--primary); padding: 0.25rem 0.6rem; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
    .percentage-badge.high { background-color: #dcfce7; color: var(--success); }
    
    .no-data { padding: 3rem; text-align: center; color: #64748b; font-style: italic; }
    .loading { padding: 2rem; text-align: center; font-weight: 600; color: var(--accent); }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <h1 id="portal-title">Student Performance Dashboard</h1>
      <p style="color: #64748b; margin-top: 0.25rem;" id="student-subtitle"></p>
    </div>
    <div class="user-badge" id="user-role-badge">Loading Session...</div>
  </header>

  <div class="filter-panel" id="teacher-controls">
    <label for="studentSelect">Reviewing Transcript For:</label>
    <select id="studentSelect" disabled>
      <option value="" disabled selected>Loading active student directory...</option>
    </select>
  </div>

  <div class="table-container">
    <table id="scores-table">
      <thead>
        <tr>
          <th>Subject</th>
          <th>Form/Class</th>
          <th>Term</th>
          <th>Objectives</th>
          <th>Theory</th>
          <th>Practicals</th>
          <th>Total Score</th>
          <th>Percentage</th>
        </tr>
      </thead>
      <tbody id="scores-tbody">
        <tr>
          <td colspan="8" class="loading">Establishing secure connection to database...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module" src="index.js">
  
</script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management - Assign Subjects</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6 md:p-12">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-blue-600 p-6 text-white">
            <h1 class="text-xl font-bold">Assign Subjects to Teacher</h1>
            <p class="text-sm text-blue-100 mt-1">Manage workloads and course allocations dynamically.</p>
        </div>

        <div class="p-6 space-y-6">
            <div id="statusAlert" class="hidden p-4 text-sm rounded-lg" role="alert"></div>

            <div>
                <label for="teacherSelect" class="block text-sm font-semibold text-gray-700 mb-2">
                    1. Select a Teacher
                </label>
                <select id="teacherSelect" class="w-full md:w-1/2 px-3 py-2 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">-- Choose a Teacher --</option>
                    
                </select>
            </div>

            <hr class="border-gray-200">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-3">
                    2. Allocate Subjects
                </label>
                
                <div class="grid grid-cols-1 md:grid-cols-7 gap-4 items-center">
                    
                    <div class="md:col-span-3 space-y-2">
                        <span class="text-xs font-bold text-gray-500 uppercase tracking-wider block">Available Subjects</span>
                        <div id="availablePool" class="border border-gray-200 rounded-lg h-64 overflow-y-auto bg-gray-50 p-2 space-y-1">
                            <div data-id="MATH-101" class="subject-card p-3 bg-white rounded border border-gray-200 shadow-sm hover:border-blue-500 cursor-pointer transition flex justify-between items-center">
                                <div>
                                    <p class="font-medium text-sm text-gray-800">Calculus I</p>
                                    <p class="text-xs text-gray-500">MATH-101</p>
                                </div>
                                <span class="text-blue-500 font-bold text-lg">&rarr;</span>
                            </div>
                            <div data-id="CS-202" class="subject-card p-3 bg-white rounded border border-gray-200 shadow-sm hover:border-blue-500 cursor-pointer transition flex justify-between items-center">
                                <div>
                                    <p class="font-medium text-sm text-gray-800">Data Structures</p>
                                    <p class="text-xs text-gray-500">CS-202</p>
                                </div>
                                <span class="text-blue-500 font-bold text-lg">&rarr;</span>
                            </div>
                            <div data-id="PHYS-301" class="subject-card p-3 bg-white rounded border border-gray-200 shadow-sm hover:border-blue-500 cursor-pointer transition flex justify-between items-center">
                                <div>
                                    <p class="font-medium text-sm text-gray-800">Quantum Mechanics</p>
                                    <p class="text-xs text-gray-500">PHYS-301</p>
                                </div>
                                <span class="text-blue-500 font-bold text-lg">&rarr;</span>
                            </div>
                        </div>
                    </div>

                    <div class="md:col-span-1 flex flex-col items-center justify-center space-y-1 text-gray-400 text-xs text-center py-2">
                        <span class="hidden md:block text-xl">&larr;&rarr;</span>
                        <p class="font-medium">Click items to move them</p>
                    </div>

                    <div class="md:col-span-3 space-y-2">
                        <span class="text-xs font-bold text-blue-600 uppercase tracking-wider block">Assigned to Teacher</span>
                        <div id="assignedPool" class="border-2 border-dashed border-blue-200 rounded-lg h-64 overflow-y-auto bg-blue-50/30 p-2 space-y-1">
                            <p id="emptyStatePlaceholder" class="text-sm text-gray-400 text-center pt-24 italic">No subjects assigned yet.</p>
                        </div>
                    </div>

                </div>
            </div>

            <div class="flex justify-end pt-4 border-t border-gray-100">
                <button id="saveAllocationBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-6 rounded-lg shadow-sm transition duration-150 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    Save Assignments
                </button>
            </div>

        </div>
    </div>

    <script type="module" src="assign-subject.js">
        
    </script>
</body>
</html>

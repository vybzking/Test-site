<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexible Exam Builder</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg-main: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --danger: #ef4444;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 40px 20px; }
    .container { width: 100%; max-width: 800px; }
    
    .header-card { background: var(--card-bg); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 24px; }
    .header-card h2 { font-size: 1.5rem; margin-bottom: 8px; }
    
    .question-block { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 3px rgb(0 0 0 / 0.05); }
    
    .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid #f1f5f9; padding-bottom: 12px; gap: 12px; }
    .question-title { font-weight: 600; font-size: 1.1rem; color: var(--primary); white-space: nowrap; }
    
    /* Type Selector Styling */
    .type-select { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 0.875rem; background-color: #f8fafc; font-weight: 500; cursor: pointer; }
    .type-select:focus { border-color: var(--primary); outline: none; }

    input[type="text"] { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; outline: none; }
    input[type="text"]:focus { border-color: var(--primary); }
    .question-input { font-weight: 500; margin-bottom: 20px; background-color: #fafafa; }
    
    .section-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    
    .statements-container, .options-container { background-color: #f8fafc; padding: 16px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #cbd5e1; }
    .statement-row, .option-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    
    .roman-label { font-weight: 600; min-width: 30px; color: var(--primary); text-align: right; }
    .alpha-label { font-weight: 700; min-width: 20px; }
    
    /* Utility utility hidden class */
    .hidden { display: none !important; }

    .correct-radio { appearance: none; width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; cursor: pointer; display: grid; place-content: center; transition: all 0.2s; }
    .correct-radio:checked { border-color: var(--success); background-color: var(--success); }
    .correct-radio:checked::before { content: "\f00c"; font-family: "Font Awesome 5 Free"; font-weight: 900; color: white; font-size: 0.75rem; }
    
    .btn { padding: 8px 14px; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-danger { background: transparent; color: var(--danger); }
    .btn-danger:hover { background: #fee2e2; }
    .btn-secondary { background: #e2e8f0; color: var(--text-main); }
    .btn-secondary:hover { background: #cbd5e1; }
    .btn-sm-add { padding: 4px 10px; font-size: 0.75rem; background: var(--primary); color: white; }
    
    .action-bar { display: flex; gap: 16px; margin-top: 32px; }
    .btn-add-q { flex: 1; background: transparent; border: 2px dashed var(--border); padding: 16px; font-size: 1rem; border-radius: var(--radius); justify-content: center; }
    .btn-add-q:hover { border-color: var(--primary); color: var(--primary); background: #f5f3ff; }
    .btn-submit { background: var(--primary); color: white; padding: 16px 32px; font-size: 1rem; font-weight: 600; border-radius: var(--radius); }
    .btn-submit:hover { background: var(--primary-hover); }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-card">
      <h2>Adaptive WAEC & MCQ Exam Builder</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem;">Add questions sequentially. Use the dropdown inside each question box to choose between standard options or Roman Numeral formats.</p>
    </div>

    <form id="exam-form">
      <div id="quiz-wrapper">
        <!-- Default Question 1 -->
        <div class="question-block" data-question-id="1">
          <div class="question-header">
            <span class="question-title">Question 1</span>
            
            <!-- TYPE SELECTOR DROPDOWN -->
            <select class="type-select">
              <option value="STANDARD">Standard MCQ (A, B, C, D)</option>
              <option value="WAEC_ROMAN">WAEC Type (i, ii, iii Statements)</option>
            </select>

            <button type="button" class="btn btn-danger delete-q-btn"><i class="fa-solid fa-trash-can"></i> Remove</button>
          </div>
          
          <input type="text" class="question-input" placeholder="Type your question prompt here..." required>
          
          <!-- ROMAN NUMERAL CONTAINER (Hidden by default for standard option layout) -->
          <div class="roman-section wrapper hidden">
            <div class="section-title">
              <span>Statements / Premises</span>
              <button type="button" class="btn btn-sm-add add-statement-btn"><i class="fa-solid fa-plus"></i> Add Statement</button>
            </div>
            <div class="statements-container">
              <div class="statement-row"><span class="roman-label">i.</span><input type="text" class="statement-input" placeholder="Statement i"><button type="button" class="btn btn-danger remove-stmt-btn">&times;</button></div>
              <div class="statement-row"><span class="roman-label">ii.</span><input type="text" class="statement-input" placeholder="Statement ii"><button type="button" class="btn btn-danger remove-stmt-btn">&times;</button></div>
            </div>
          </div>

          <!-- OPTION CONFIGURATION WORKSPACE CONTAINER -->
          <div class="section-title">Options & Correct Answer Selection</div>
          <div class="options-container">
            <div class="option-row"><input type="radio" name="correct-ans-1" class="correct-radio" checked required><span class="alpha-label">A.</span><input type="text" class="option-input" placeholder="Option A" required></div>
            <div class="option-row"><input type="radio" name="correct-ans-1" class="correct-radio"><span class="alpha-label">B.</span><input type="text" class="option-input" placeholder="Option B" required></div>
            <div class="option-row"><input type="radio" name="correct-ans-1" class="correct-radio"><span class="alpha-label">C.</span><input type="text" class="option-input" placeholder="Option C" required></div>
            <div class="option-row"><input type="radio" name="correct-ans-1" class="correct-radio"><span class="alpha-label">D.</span><input type="text" class="option-input" placeholder="Option D" required></div>
          </div>
        </div>
      </div>

      <div class="action-bar">
        <button type="button" id="add-question-btn" class="btn btn-add-q"><i class="fa-solid fa-folder-plus"></i> Add Next Question</button>
        <button type="submit" class="btn btn-submit">Save Exam Set</button>
      </div>
    </form>
  </div>

  <script type="module" src="add-mcq.js">
    
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WASSCE Score Entry Portal</title>
  <style>
    /* Deep dark purple theme styling */
    body {
      margin: 0;
      padding: 40px 20px;
      background-color: #120524;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #f3f0f7;
      display: flex;
      justify-content: center;
    }

    .form-container {
      background-color: #220f3d;
      width: 100%;
      max-width: 600px;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4), 0 0 1px 1px rgba(255, 255, 255, 0.1);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 25px;
      color: #ffffff;
      font-size: 24px;
      border-bottom: 1px solid #3d2461;
      padding-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: #cbd5e1;
    }

    input[type="number"],
    select {
      width: 100%;
      padding: 12px;
      background-color: #1a0933;
      border: 1px solid #4c2f75;
      border-radius: 8px;
      font-size: 15px;
      color: #ffffff;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    select:disabled {
      background-color: #1f1430;
      color: #75628c;
      cursor: not-allowed;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #9061f9;
      box-shadow: 0 0 0 3px rgba(144, 97, 249, 0.25);
    }

    .score-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 15px;
      padding: 15px;
      background-color: rgba(26, 9, 51, 0.4);
      border-radius: 8px;
      border: 1px solid #3d2461;
    }

    .score-pair-title {
      grid-column: span 2;
      font-size: 14px;
      font-weight: bold;
      color: #9061f9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: -5px;
    }

    .submit-btn {
      width: 100%;
      background-color: #7e3af2;
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 15px;
      letter-spacing: 0.5px;
    }

    .submit-btn:hover {
      background-color: #6c2bd9;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>WASSCE Student Performance Entry</h2>

    <form id="wassce-score-form">
      
      <!-- Student Name Select Field (Populated by Firestore) -->
      <div class="form-group">
        <label for="studentSelect">Select Active Student</label>
        <select id="studentSelect" required disabled>
          <option value="" disabled selected>Loading active students...</option>
        </select>
      </div>

      <!-- WASSCE Subjects selection -->
      <div class="form-group">
        <label for="subject">WASSCE Subject</label>
        <select id="subject" required>
          <option value="" disabled selected>Choose WASSCE subject...</option>
          <optgroup label="Core Subjects">
            <option value="core_math">Core Mathematics</option>
            <option value="core_english">English Language</option>
            <option value="integrated_science">Integrated Science</option>
            <option value="social_studies">Social Studies</option>
          </optgroup>
          <optgroup label="Electives">
            <option value="elective_math">Elective Mathematics</option>
            <option value="ict_elective">Information & Comm. Technology (ICT)</option>
            <option value="physics">Physics</option>
            <option value="chemistry">Chemistry</option>
            <option value="biology">Biology</option>
          </optgroup>
        </select>
      </div>

      <!-- OBJECTIVES PAIR -->
      <div class="score-pair">
        <div class="score-pair-title">1. Objectives Component</div>
        <div class="form-group" style="margin-bottom:0;">
          <label for="objectives">Score Obtained</label>
          <input type="number" id="objectives" min="0" placeholder="e.g., 45" required>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label for="objectivesTotal">Expected Total Marks</label>
          <input type="number" id="objectivesTotal" min="1" value="60" required>
        </div>
      </div>

      <!-- THEORY PAIR -->
      <div class="score-pair">
        <div class="score-pair-title">2. Theory Component</div>
        <div class="form-group" style="margin-bottom:0;">
          <label for="theory">Score Obtained</label>
          <input type="number" id="theory" min="0" placeholder="e.g., 78" required>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label for="theoryTotal">Expected Total Marks</label>
          <input type="number" id="theoryTotal" min="1" value="100" required>
        </div>
      </div>

      <!-- PRACTICALS PAIR -->
      <div class="score-pair">
        <div class="score-pair-title">3. Practicals Component (Optional)</div>
        <div class="form-group" style="margin-bottom:0;">
          <label for="practicals">Score Obtained</label>
          <input type="number" id="practicals" min="0" value="0">
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label for="practicalsTotal">Expected Total Marks</label>
          <input type="number" id="practicalsTotal" min="0" value="0">
        </div>
      </div>

      <button type="submit" class="submit-btn">Record Marks</button>
    </form>
  </div>

  <!-- Load Firebase App, Firestore SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, doc , serverTimestamp} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    // Your actual Firebase Project keys
    const firebaseConfig = {
    apiKey: "AIzaSyCP8QucUl9sS_z5x7syJYJps8mAmocdjbo",
    authDomain: "trial-project-33cbb.firebaseapp.com",
    projectId: "trial-project-33cbb",
    storageBucket: "trial-project-33cbb.firebasestorage.app",
    messagingSenderId: "453484633595",
    appId: "1:453484633595:web:2cc944c931387521fdff5e",
    measurementId: "G-N9QJPYSGQM"
  };

    // Initialize Firebase Services
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const studentSelect = document.getElementById('studentSelect');

    // 1. FETCH ACTIVE STUDENTS FROM FIRESTORE ON PAGE LOAD
    async function loadActiveStudents() {
      try {
        // Point to the 'users' collection
        const usersRef = collection(db, "users");
        
        // Query to filter where field 'isAccountActive' (or whatever flag you use) is true
        const q = query(usersRef, where("isAccountActive", "==", true) ;
        const querySnapshot = await getDocs(q);
        alert(querySnapshot);
        // Clear the loading message
        studentSelect.innerHTML = '<option value="" disabled selected>Choose a student...</option>';

        if (querySnapshot.empty) {
          studentSelect.innerHTML = '<option value="" disabled>No active students found</option>';
          return;
        }

        // Loop through Firestore records and build dropdown options
        querySnapshot.forEach((doc) => {
          const studentData = doc.data();
          alert(studentData);
          const option = document.createElement('option');
          
          // Use the unique Firestore document ID (UID) as the option value
          option.value = doc.id; 
          // Show the student's name to the administrator
          option.textContent = studentData.displayName || "Unnamed Student";
          
          studentSelect.appendChild(option);
        });

        // Enable the input element now that data is loaded
        studentSelect.disabled = false;

      } catch (error) {
        console.error("Error fetching students:", error);
        studentSelect.innerHTML = '<option value="" disabled>Failed to load students</option>';
      }
    }

    // Trigger the fetch process immediately
    onAuthStateChanged(getAuth(app), async (user) => {
  if (user) {
    console.log("Logged in user verified:", user.uid);
    // Token is safely loaded and attached! Now it's safe to fetch the students
    await loadActiveStudents();
  } else {
    console.log("No token found. Booting back to login...");
    window.location.href = "login.html";
  }
});

    // 2. SUBMIT COMPILED MARKS TO FIRESTORE
    // Inside your 'submit' event listener on score-uploads.html:
document.getElementById('wassce-score-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const studentSelect = document.getElementById('studentSelect');
  
  // 1. Gather values and explicitly convert inputs to raw base-10 numbers
  const studentUid = studentSelect.value || "";
  const studentName = studentSelect.options[studentSelect.selectedIndex]?.text || "Unknown Student";
  const subject = document.getElementById('subject').value || "General";

  // Force numeric types with fallback values to protect against NaN / undefined strings
  const objectivesScore = parseInt(document.getElementById('objectives').value, 10) || 0;
  const objectivesTotal = parseInt(document.getElementById('objectivesTotal').value, 10) || 60;
  
  const theoryScore = parseInt(document.getElementById('theory').value, 10) || 0;
  const theoryTotal = parseInt(document.getElementById('theoryTotal').value, 10) || 100;
  
  const practicalsScore = parseInt(document.getElementById('practicals').value, 10) || 0;
  const practicalsTotal = parseInt(document.getElementById('practicalsTotal').value, 10) || 100;

  // 2. Math Calculations
  const grandTotalObtained = objectivesScore + theoryScore + practicalsScore;
  const grandTotalPossible = objectivesTotal + theoryTotal + practicalsTotal;
  const calculatedPercentage = grandTotalPossible > 0 ? ((grandTotalObtained / grandTotalPossible) * 100).toFixed(1) : "0.0";

  // 3. Construct clean, production-ready payload data free of undefined keys
  async function saveStudentAssessment(
  termId,
  studentUid,
  studentName,
  subject,
  objectivesScore,
  objectivesTotal,
  theoryScore,
  theoryTotal,
  practicalsScore,
  practicalsTotal,
  grandTotalObtained,
  grandTotalPossible,
  calculatedPercentage
) {
  try {
    // 2. CONSTRUCT YOUR EXACT PAYLOAD WITH FORMATTING FIXES
    // Number() guarantees data types don't get saved as strings by accident.
    const assessmentPayload = {
      studentUid: studentUid,
      studentName: studentName,
      subject: subject.toLowerCase().trim(), // "Math" becomes "math" for clean URLs
      objectivesObtained: Number(objectivesScore || 0),
      objectivesPossible: Number(objectivesTotal || 0),
      theoryObtained: Number(theoryScore || 0),
      theoryPossible: Number(theoryTotal || 0),
      practicalsObtained: Number(practicalsScore || 0),
      practicalsPossible: Number(practicalsTotal || 0),
      totalObtained: Number(grandTotalObtained || 0),
      totalPossible: Number(grandTotalPossible || 0),
      percentage: Number(calculatedPercentage || 0), 
      
      // Upgraded to Firestore server timestamp to avoid user device clock errors
      recordedAt: serverTimestamp() 
    };

    // 3. DEFINE THE NESTED PATH USING YOUR ROADMAP STRINGS
    // Path: students/[studentUid]/terms/[termId]/subjects/[subjectId]
    const subjectId = assessmentPayload.subject; 
    
    const docRef = doc(
      db, 
      "students", studentUid, 
      "terms", termId, 
      "subjects", subjectId
    );

    // 4. WRITE SAFELY TO FIRESTORE
    // { merge: true } prevents erasing existing terms or subjects.
    await setDoc(docRef, assessmentPayload, { merge: true });
    
    alert(`✅ Assessment saved! Path: students/${studentUid}/terms/${termId}/subjects/${subjectId}`);
    return { success: true };

  } catch (error) {
    alert("❌ Firestore Save Operation Failed:", error);
    throw error;
  }
}
  
  </script>

</body>
</html>
